<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>モジホコリ</title>
    <link rel="stylesheet" href="style.css?v=20260717-8" />
  </head>
  <body>
    <main id="artwork"></main>
    <p class="interaction-hint">餌と障害物はドラッグで移動できます</p>
    <button
      id="environment-toggle"
      class="environment-control"
      type="button"
      aria-label="環境を変える。現在: 朽ち木"
    >
      <span>環境を変える</span>
      <strong id="environment-name" aria-live="polite">朽ち木</strong>
      <span class="environment-control__icon" aria-hidden="true">↻</span>
    </button>
    <div class="speed-control" role="group" aria-label="成長速度">
      <span>成長速度</span>
      <button type="button" data-speed="0.1">0.1×</button>
      <button type="button" data-speed="1">1×</button>
      <button type="button" data-speed="20" class="is-active" aria-pressed="true">20×</button>
      <button type="button" data-speed="50">50×</button>
      <button type="button" data-speed="100">100×</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
    <script src="sketch.js?v=20260717-9"></script>
  </body>
</html>
