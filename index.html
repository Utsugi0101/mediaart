<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>モジホコリ</title>
    <link rel="stylesheet" href="style.css?v=20260717-10" />
  </head>
  <body class="is-awaiting-start">
    <main id="artwork"></main>
    <section
      id="experience-start"
      class="experience-start"
      role="dialog"
      aria-modal="true"
      aria-labelledby="experience-title"
      aria-describedby="experience-description"
    >
      <div class="experience-start__panel">
        <p class="experience-start__eyebrow">PHYSARUM OBSERVATION</p>
        <h1 id="experience-title">モジホコリ</h1>
        <p id="experience-description" class="experience-start__description">
          餌と障害物を動かして、環境に応じて変わり続ける形を観察します。
        </p>
        <div class="experience-start__actions">
          <button id="experience-start-fullscreen" type="button" autofocus>
            <span aria-hidden="true">⛶</span>
            全画面で始める
          </button>
          <button id="experience-start-windowed" type="button">そのまま見る</button>
        </div>
        <p class="experience-start__note">Escキーで全画面を終了できます</p>
      </div>
    </section>
    <button
      id="fullscreen-toggle"
      class="fullscreen-control"
      type="button"
      aria-label="全画面にする"
      aria-pressed="false"
    >
      <span class="fullscreen-control__icon" aria-hidden="true">⛶</span>
      <span id="fullscreen-label">全画面</span>
    </button>
    <p class="interaction-hint">餌と障害物はドラッグで移動できます</p>
    <button
      id="environment-toggle"
      class="environment-control"
      type="button"
      aria-label="環境を変える。現在: 朽ち木"
    >
      <span>環境を変える</span>
      <strong id="environment-name" aria-live="polite">朽ち木</strong>
      <span class="environment-control__icon" aria-hidden="true">↻</span>
    </button>
    <div class="speed-control" role="group" aria-label="成長速度">
      <span>成長速度</span>
      <button type="button" data-speed="0.1">0.1×</button>
      <button type="button" data-speed="1">1×</button>
      <button type="button" data-speed="20" class="is-active" aria-pressed="true">20×</button>
      <button type="button" data-speed="50">50×</button>
      <button type="button" data-speed="100">100×</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
    <script src="sketch.js?v=20260717-10"></script>
  </body>
</html>
