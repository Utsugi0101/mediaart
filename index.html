<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>モジホコリ</title>
    <link rel="stylesheet" href="style.css?v=20260717-5" />

    <main id="artwork"></main>
    <p class="interaction-hint">餌はドラッグ中に消え、離した場所で反応します</p>

      <span>成長速度</span>
      <button type="button" data-speed="0.1">0.1×</button>

      <button type="button" data-speed="100">100×</button>
